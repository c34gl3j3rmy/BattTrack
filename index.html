<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battery Reminder</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <button id="menu-button" class="icon-button" type="button" aria-label="Menu">☰</button>
    <h1 id="page-title">Battery Reminder</h1>
  </header>

  <aside id="side-menu" class="side-menu" hidden>
    <div class="side-menu-panel">
      <div class="side-menu-header">
        <h2>Menu</h2>
        <button id="close-menu-button" class="icon-button secondary-icon" type="button" aria-label="Fermer">×</button>
      </div>
      <button class="menu-entry" id="menu-dashboard" type="button">🏠 Tableau de bord</button>
      <button class="menu-entry" id="menu-batteries" type="button">🔋 Batteries</button>
      <button class="menu-entry" id="menu-archives" type="button">📦 Archives</button>
      <button class="menu-entry" id="menu-settings" type="button">⚙️ Paramètres</button>
      <button class="menu-entry" id="menu-export-json" type="button">💾 Exporter JSON</button>
      <button class="menu-entry" id="menu-import-json" type="button">📥 Importer JSON</button>
      <input id="import-json-input" type="file" accept="application/json" hidden>
    </div>
  </aside>

  <main id="app" class="app-shell">
    <p>Chargement...</p>
  </main>

  <button id="floating-action-button" class="fab" type="button" aria-label="Action principale">+</button>

  <div id="modal-root"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
